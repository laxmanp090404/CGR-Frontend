<div class="toast-container" role="status" aria-live="polite" aria-atomic="false">
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div class="toast toast--{{ toast.type }}" [id]="'toast-' + toast.id">
      <span class="toast__icon" aria-hidden="true">
        @switch (toast.type) {
          @case ('success') {
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.5-10.5-4.5 4.5-2-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('error') {
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
              <path d="M10 6v4M10 14h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          }
          @case ('warning') {
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M10 3 2 17h16L10 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M10 9v3M10 14h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          }
          @default {
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
              <path d="M10 9v5M10 6h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          }
        }
      </span>
      <span class="toast__message">{{ toast.message }}</span>
      <button
        type="button"
        class="toast__close"
        (click)="dismiss(toast.id)"
        [attr.aria-label]="'Dismiss notification'"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  }
</div>
